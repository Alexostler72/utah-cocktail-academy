name: Expand application bundle

on:
  push:
    paths:
      - ".bundle-parts/**"
      - ".github/workflows/unpack.yml"

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct and extract source
        shell: bash
        run: |
          set -euo pipefail
          cat .bundle-parts/part-* | base64 --decode > /tmp/utah-cocktail-academy.zip
          rm -rf /tmp/utah-cocktail-academy
          mkdir -p /tmp/utah-cocktail-academy
          unzip -q /tmp/utah-cocktail-academy.zip -d /tmp/utah-cocktail-academy
          cp -a /tmp/utah-cocktail-academy/utah-cocktail-academy/. .
          rm -rf .bundle-parts
          rm -f .github/workflows/unpack.yml
      - name: Commit expanded source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Expand Utah Cocktail Academy source"
          git push origin HEAD:main
