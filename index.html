<!doctype html>
<html lang="en" data-theme="bar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#151312">
  <meta name="description" content="Utah Cocktail Academy — cocktail recipes, bartender study tools, practice scenarios, and a configurable Utah alcohol-law reference.">
  <title>Utah Cocktail Academy</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></symbol>
    <symbol id="i-glass" viewBox="0 0 24 24"><path d="M5 3h14l-2 7a5.2 5.2 0 0 1-4 3.7V20h4v1H7v-1h4v-6.3A5.2 5.2 0 0 1 7 10z"/><path d="M7.2 8h9.6"/></symbol>
    <symbol id="i-study" viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H11v16H6.5A2.5 2.5 0 0 0 4 21.5zM20 5.5A2.5 2.5 0 0 0 17.5 3H13v16h4.5a2.5 2.5 0 0 1 2.5 2.5z"/></symbol>
    <symbol id="i-practice" viewBox="0 0 24 24"><path d="M4 8h16v11H4zM7 8V5h10v3M8 13h8M8 16h5"/></symbol>
    <symbol id="i-ingredient" viewBox="0 0 24 24"><path d="M9 3h6v3l2 2v12H7V8l2-2zM9 12h6"/></symbol>
    <symbol id="i-technique" viewBox="0 0 24 24"><path d="m14 4 6 6-9.5 9.5a2.1 2.1 0 0 1-3 0l-3-3a2.1 2.1 0 0 1 0-3zM12 6l6 6"/></symbol>
    <symbol id="i-law" viewBox="0 0 24 24"><path d="M12 3v18M5 7h14M7 7l-3 6h6zM17 7l-3 6h6zM8 21h8"/></symbol>
    <symbol id="i-progress" viewBox="0 0 24 24"><path d="M4 20V10h4v10M10 20V4h4v16M16 20v-7h4v7"/></symbol>
    <symbol id="i-heart" viewBox="0 0 24 24"><path d="M12 20S4 15.4 4 9.4C4 6.4 6.1 4 9 4c1.7 0 2.8.8 3 2 .2-1.2 1.3-2 3-2 2.9 0 5 2.4 5 5.4C20 15.4 12 20 12 20z"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="m16 16 5 5"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9z"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
    <symbol id="i-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></symbol>
    <symbol id="i-random" viewBox="0 0 24 24"><path d="M4 7h3c5 0 5 10 10 10h3M17 4l3 3-3 3M4 17h3c2.2 0 3.3-1.9 4.4-4M17 14l3 3-3 3"/></symbol>
  </svg>

  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="brand" href="#home" aria-label="Utah Cocktail Academy home">
        <span class="brand-mark" aria-hidden="true"><svg><use href="#i-glass"></use></svg></span>
        <span><strong>Utah Cocktail</strong><small>Academy</small></span>
      </a>
      <nav id="desktop-nav" class="desktop-nav"></nav>
      <div class="sidebar-foot">
        <p>Local-first training</p>
        <small>No accounts · No analytics</small>
      </div>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <button id="menu-toggle" class="icon-button mobile-only" aria-label="Open navigation" aria-expanded="false">
          <svg><use href="#i-menu"></use></svg>
        </button>
        <div class="topbar-title">
          <span class="eyebrow">Utah Cocktail Academy</span>
          <h1 id="page-title">Home</h1>
        </div>
        <button id="global-random" class="icon-button" aria-label="Open a random cocktail" title="Random cocktail">
          <svg><use href="#i-random"></use></svg>
        </button>
      </header>

      <main id="main-content" tabindex="-1">
        <div class="loading-state" role="status" aria-live="polite">
          <div class="shaker-loader" aria-hidden="true"></div>
          <p>Polishing the bar…</p>
        </div>
      </main>
    </div>
  </div>

  <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile navigation"></nav>

  <dialog id="custom-cocktail-dialog" class="modal">
    <form id="custom-cocktail-form" method="dialog">
      <div class="modal-head">
        <div>
          <span class="eyebrow">Private browser data</span>
          <h2>Create custom cocktail</h2>
        </div>
        <button type="button" class="icon-button" data-close-dialog aria-label="Close">
          <svg><use href="#i-close"></use></svg>
        </button>
      </div>
      <div class="form-grid">
        <label>Name<input required name="name" maxlength="80"></label>
        <label>Base spirit<input required name="baseSpirit" maxlength="60"></label>
        <label>Family<input name="family" value="Custom"></label>
        <label>Glassware<input required name="glassware" value="Rocks glass"></label>
        <label>Method<select name="method"><option>Build</option><option>Shake</option><option>Stir</option><option>Blend</option><option>Swizzle</option></select></label>
        <label>Ice<input name="iceType" value="Standard cubes"></label>
        <label class="wide">Ingredients, one per line <span class="field-hint">Format: amount | unit | ingredient | classification</span>
          <textarea required name="ingredients" rows="7" placeholder="1.5 | oz | Bourbon | primary_spirit&#10;0.5 | oz | Lemon juice | juice"></textarea>
        </label>
        <label class="wide">Garnish<input name="garnish" value="None"></label>
        <label class="wide">Private notes<textarea name="notes" rows="3"></textarea></label>
      </div>
      <div class="modal-actions">
        <button type="button" class="button ghost" data-close-dialog>Cancel</button>
        <button class="button primary" value="save">Save cocktail</button>
      </div>
    </form>
  </dialog>

  <input id="import-file" type="file" accept="application/json" hidden>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
